<style>
:root {
  --bg: #0a0a1a; --bg2: #0f1024; --card: #161830; --line: #262948;
  --text: #e6e8ff; --muted: #9aa0c3; --accent: #7c5cff; --accent2: #22d3ee;
  --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --pink: #ec4899;
  --r: 14px; --r-sm: 8px; --sidebar-w: 280px;
  --font-mono: ui-monospace,"SF Mono",Menlo,"Cascadia Code",Consolas,monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh;width:100vw}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{font:inherit;color:inherit;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 14px;outline:none;width:100%;resize:none}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* Sidebar */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:20;transition:transform .3s ease}
#sidebar.collapsed{transform:translateX(-100%)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff}
.sidebar-title{font-size:15px;font-weight:700;white-space:nowrap}
.sidebar-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.sidebar-actions{display:flex;gap:6px;margin-left:auto}
.sidebar-actions button{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .2s}
.sidebar-actions button:hover{background:var(--card)}
.sidebar-search{padding:10px 14px;flex-shrink:0}
.sidebar-search input{font-size:12.5px;padding:8px 12px;border-radius:20px}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 8px}
.nav-section{margin-bottom:4px}
.nav-section-header{display:flex;align-items:center;gap:6px;padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);cursor:pointer;border-radius:6px;user-select:none}
.nav-section-header:hover{background:var(--card)}
.nav-section-header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-section-header .arrow{font-size:10px;margin-left:auto;transition:transform .2s}
.nav-section.collapsed .agent-list{display:none}
.nav-section.collapsed .arrow{transform:rotate(-90deg)}
.agent-list{list-style:none}
.agent-item{padding:9px 10px 9px 24px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:all .15s;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-item:hover{background:var(--card)}
.agent-item.active{background:rgba(124,92,255,.15);color:#c4b5fd}
.agent-item.active::before{content:"";position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.agent-item .emoji{font-size:15px;flex-shrink:0}
.agent-item .name{overflow:hidden;text-overflow:ellipsis}
.agent-item .badge{font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(34,197,94,.15);color:var(--green);margin-left:auto;flex-shrink:0}

/* Conversation List */
.conv-section{border-top:1px solid var(--line);flex-shrink:0;overflow-y:auto;max-height:180px}
.conv-section-header{padding:8px 14px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.conv-list{list-style:none;padding:0 8px 4px}
.conv-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;display:flex;align-items:center;gap:8px;transition:all .15s}
.conv-item:hover{background:var(--card)}
.conv-item.active{background:rgba(124,92,255,.15);color:#c4b5fd}
.conv-item .conv-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.conv-item .conv-delete{font-size:14px;color:var(--red);opacity:0;transition:opacity .2s;padding:2px 6px;border-radius:4px}
.conv-item:hover .conv-delete{opacity:.7}
.conv-item .conv-delete:hover{opacity:1;background:rgba(239,68,68,.15)}

.sidebar-footer{padding:12px;border-top:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.sidebar-footer button{width:100%;padding:9px 0;border-radius:8px;font-size:13px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.sidebar-footer .btn-token{background:rgba(124,92,255,.12);color:#c4b5fd}
.sidebar-footer .btn-token:hover{background:rgba(124,92,255,.25)}
.sidebar-footer .btn-settings{background:var(--card);color:var(--muted)}
.sidebar-footer .btn-settings:hover{background:var(--line)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.main-header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);flex-shrink:0;z-index:10;background:var(--bg)}
.main-header .menu-btn{width:36px;height:36px;border-radius:8px;display:none;align-items:center;justify-content:center;font-size:20px}
.main-header .menu-btn:hover{background:var(--card)}
.main-header .conv-title-bar{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-info{display:flex;align-items:center;gap:10px}
.agent-info .agent-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.agent-info .agent-name{font-weight:700;font-size:15px}
.agent-info .agent-role{font-size:11px;color:var(--muted)}
.mode-switch{margin-left:auto;display:flex;background:var(--bg2);border-radius:20px;padding:2px;border:1px solid var(--line)}
.mode-switch button{padding:7px 16px;border-radius:18px;font-size:12.5px;font-weight:600;transition:all .2s;white-space:nowrap}
.mode-switch button.active{background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;box-shadow:0 2px 8px rgba(124,92,255,.3)}
.token-bar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--bg2);border-radius:20px;font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.token-bar .used{color:var(--accent2)}
.token-bar .limit{color:var(--muted)}
.progress-ring{width:28px;height:28px;flex-shrink:0}

/* Chat */
#chat-container{flex:1;overflow-y:auto;padding:20px}
.chat-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px}
.chat-welcome .logo-lg{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(124,92,255,.3)}
.chat-welcome h2{font-size:22px;margin-bottom:8px}
.chat-welcome p{color:var(--muted);max-width:500px;margin-bottom:24px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px}
.quick-action{padding:10px 18px;border-radius:20px;background:var(--card);border:1px solid var(--line);font-size:13px;transition:all .2s;text-align:left}
.quick-action:hover{background:var(--bg2);border-color:var(--accent);transform:translateY(-1px)}

/* Messages */
.message{display:flex;gap:12px;margin-bottom:20px;animation:fadeIn .3s ease;position:relative}
.message.user{flex-direction:row-reverse}
.message .msg-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.message.user .msg-avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.message.agent .msg-avatar{background:var(--card);border:1px solid var(--line)}
.msg-content{max-width:75%;min-width:0}
.msg-header{font-size:11px;color:var(--muted);margin-bottom:4px}
.msg-body{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;font-size:14px;line-height:1.75;word-break:break-word;position:relative}
.message.user .msg-body{background:rgba(124,92,255,.12);border-color:rgba(124,92,255,.3)}
.msg-body p{margin-bottom:10px}
.msg-body p:last-child{margin-bottom:0}
.msg-body ul,.msg-body ol{padding-left:20px;margin:8px 0}
.msg-body li{margin-bottom:4px}
.msg-body strong{color:#c4b5fd}
.msg-body em{color:var(--accent2)}

/* Rating */
.msg-rating{display:flex;gap:4px;margin-top:8px;opacity:.4;transition:opacity .2s;align-items:center}
.message:hover .msg-rating{opacity:1}
.msg-rating button{padding:4px 8px;border-radius:6px;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:3px}
.msg-rating .btn-good:hover{background:rgba(34,197,94,.12);color:var(--green)}
.msg-rating .btn-bad:hover{background:rgba(239,68,68,.12);color:var(--red)}
.msg-rating .btn-good.rated{color:var(--green);background:rgba(34,197,94,.12)}
.msg-rating .btn-bad.rated{color:var(--red);background:rgba(239,68,68,.12)}

/* Streaming cursor */
.streaming-cursor::after{content:"|";animation:blink 1s infinite;color:var(--accent)}

/* Thinking */
.thinking-stream{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:16px;overflow:hidden}
.thinking-header{padding:8px 14px;font-size:11px;color:var(--amber);font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.thinking-header::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 1.5s infinite}
.thinking-header .toggle{font-size:10px;margin-left:auto}
.thinking-content{padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--muted);line-height:1.8;max-height:200px;overflow-y:auto;display:none;border-top:1px solid var(--line);white-space:pre-wrap}
.thinking-content.show{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Code Blocks */
.code-block{background:#000820;border:1px solid var(--line);border-radius:var(--r-sm);margin:12px 0;overflow:hidden;position:relative}
.code-block .code-lang{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:rgba(0,0,0,.3);font-size:11px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase}
.code-block .code-actions{display:flex;gap:4px}
.code-block .code-actions button{padding:4px 8px;font-size:11px;border-radius:4px;transition:all .2s;display:flex;align-items:center;gap:4px}
.code-block .code-actions .btn-copy{color:var(--accent2)}
.code-block .code-actions .btn-copy:hover{background:rgba(34,211,238,.12)}
.code-block .code-actions .btn-download{color:var(--green)}
.code-block .code-actions .btn-download:hover{background:rgba(34,197,94,.12)}
.code-block .btn-copied{color:var(--green)!important}
.code-block pre{padding:14px;margin:0;overflow-x:auto;font-family:var(--font-mono);font-size:13px;line-height:1.6;color:#c4b5fd;tab-size:2}
.code-block pre code{font-family:inherit}

/* Input */
#input-area{padding:16px 20px;border-top:1px solid var(--line);flex-shrink:0;z-index:10;background:var(--bg)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{min-height:44px;max-height:160px;padding:12px 16px;border-radius:var(--r);line-height:1.5}
.input-row textarea::placeholder{color:var(--muted)}
.send-btn{width:44px;height:44px;border-radius:var(--r);background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 12px rgba(124,92,255,.25)}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn.loading{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.voice-btn{width:44px;height:44px;border-radius:var(--r);background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .2s}
.voice-btn:hover{background:var(--bg2);border-color:var(--accent)}
.voice-btn.listening{background:rgba(239,68,68,.12);border-color:var(--red);animation:pulse 1s infinite}
.input-hint{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.input-hint .shortcut-tags{display:flex;gap:8px;flex-wrap:wrap}
.input-hint .shortcut-tags span{background:var(--card);padding:2px 8px;border-radius:8px;font-family:var(--font-mono);font-size:10px;border:1px solid var(--line)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--r);width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px}
.modal-header button{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
.modal-header button:hover{background:var(--line)}
.modal-body{padding:20px}
.modal-body label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.modal-body .field{margin-bottom:16px}
.modal-body select{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--text);font:inherit;outline:none}
.modal-body select:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:12px 0;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;font-weight:600;font-size:14px;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,92,255,.3)}
.btn-danger{width:100%;padding:10px 0;border-radius:var(--r-sm);background:rgba(239,68,68,.12);color:var(--red);font-weight:600;font-size:13px;margin-top:8px;transition:all .2s}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:10px 24px;font-size:13px;z-index:200;animation:slideUp .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Responsive */
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:60}
  #sidebar.open{transform:translateX(0)}
  .main-header .menu-btn{display:flex}
  .msg-content{max-width:90%}
  .mode-switch button{padding:6px 12px;font-size:11px}
  .token-bar{display:none}
  #input-area{padding:12px;padding-bottom:70px}
  .modal{width:95%;max-height:90vh}
  #bottomNav{display:block}
  .main-tabs{overflow-x:auto;white-space:nowrap}
  .learn-metrics{grid-template-columns:repeat(2,1fr)}
  .splash-stats{grid-template-columns:repeat(2,1fr);display:grid}
  .conv-section{max-height:120px}
}

/* Loading dots */
.loading-dots{display:flex;gap:4px;padding:8px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotBounce 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* Agent grid */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-width:600px;margin:12px 0}
.agent-chip{padding:8px 12px;border-radius:var(--r-sm);background:var(--card);border:1px solid var(--line);font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.agent-chip:hover{background:rgba(124,92,255,.1);border-color:var(--accent)}
.agent-chip .emoji{font-size:16px}

/* Typing */
.typing{cursor:default}
.typing::after{content:"|";animation:blink 1s infinite;color:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* KB Panel */
.kb-panel{display:none;flex:1;overflow-y:auto;padding:16px}
.kb-panel.show{display:block}
.kb-stats-bar{display:flex;gap:10px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--line);flex-wrap:wrap}
.kb-stat{padding:4px 12px;border-radius:12px;font-size:12px;font-family:var(--font-mono);background:var(--card)}
.kb-stat .num{color:var(--accent2);font-weight:700}
.kb-entry{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;transition:all .2s;cursor:pointer}
.kb-entry:hover{border-color:var(--accent);background:var(--bg2)}
.kb-entry h4{font-size:14px;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.kb-entry .diff{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.kb-entry .diff.easy{background:rgba(34,197,94,.15);color:var(--green)}
.kb-entry .diff.med{background:rgba(245,158,11,.15);color:var(--amber)}
.kb-entry .diff.hard{background:rgba(239,68,68,.15);color:var(--red)}
.kb-entry .tags{font-size:11px;color:var(--muted);margin-top:6px}
.kb-entry .tags span{background:rgba(124,92,255,.1);padding:1px 8px;border-radius:8px;margin-right:4px}

/* Learning */
.learn-panel{display:none;flex:1;overflow-y:auto;padding:16px}
.learn-panel.show{display:block}
.learn-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.learn-metric{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;text-align:center}
.learn-metric .val{font-size:24px;font-weight:700;color:var(--accent)}
.learn-metric .lbl{font-size:11px;color:var(--muted);margin-top:4px}

/* Evolution */
.evo-direction{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px;margin-bottom:12px}
.evo-direction h4{font-size:14px;margin:0 0 6px;color:var(--accent2)}
.evo-direction .evo-tech{font-size:12px;color:var(--muted);margin:4px 0}
.evo-direction .evo-tools{font-size:11px;color:var(--green);margin-top:8px}

/* Bottom Nav (Mobile) */
#bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--line);z-index:50;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}
#bottomNav .nav-tabs{display:flex;justify-content:space-around}
#bottomNav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:10px;color:var(--muted);transition:all .2s}
#bottomNav button.active{color:var(--accent)}
#bottomNav button .icon{font-size:18px}

/* Desktop tabs */
.main-tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg)}
.main-tabs button{padding:10px 18px;font-size:13px;border-bottom:2px solid transparent;transition:all .2s;color:var(--muted)}
.main-tabs button.active{border-bottom-color:var(--accent);color:var(--text);font-weight:600}
.main-tabs button:hover{color:var(--text)}

/* Splash stats */
.splash-stats{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.splash-stat{text-align:center;padding:10px 18px;background:var(--card);border-radius:12px;border:1px solid var(--line)}
.splash-stat .num{font-size:22px;font-weight:700;color:var(--accent2)}
.splash-stat .lbl{font-size:11px;color:var(--muted)}

/* Stop button */
.stop-btn{background:var(--red)!important}

/* Code Workspace Panel */
.cw-panel{display:none;flex:1;overflow-y:auto;padding:16px}
.cw-panel.show{display:block}
.cw-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.cw-header h3{font-size:16px;color:var(--accent2)}
.cw-actions{display:flex;gap:6px;margin-left:auto}
.cw-actions button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;transition:all .2s}
.cw-download-all{background:rgba(34,211,238,.12);color:var(--accent2)}
.cw-download-all:hover{background:rgba(34,211,238,.2)}
.cw-clear{background:rgba(239,68,68,.12);color:var(--red)}
.cw-clear:hover{background:rgba(239,68,68,.2)}
.cw-file-list{display:flex;flex-direction:column;gap:6px}
.cw-file{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.cw-file-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .2s}
.cw-file-header:hover{background:var(--bg2)}
.cw-file-icon{font-size:16px;flex-shrink:0}
.cw-file-name{font-weight:600;font-size:13px;flex:1}
.cw-file-meta{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.cw-file-actions{display:flex;gap:4px}
.cw-file-actions button{padding:3px 8px;border-radius:4px;font-size:11px;transition:all .2s}
.cw-file-actions .cw-copy{color:var(--accent2)}
.cw-file-actions .cw-copy:hover{background:rgba(34,211,238,.12)}
.cw-file-actions .cw-download{color:var(--green)}
.cw-file-actions .cw-download:hover{background:rgba(34,197,94,.12)}
.cw-file-body{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
.cw-file.open .cw-file-body{display:block}
.cw-file pre{margin:0;overflow-x:auto;font-family:var(--font-mono);font-size:12px;line-height:1.5;color:#c4b5fd;padding-top:10px;tab-size:2;max-height:300px;overflow-y:auto}

function updateProfile(msgCount, tokens, agentId, topic) {
  var p = state.userProfile;
  p.totalMsgs = (p.totalMsgs||0) + (msgCount||0);
  p.totalTokens = (p.totalTokens||0) + (tokens||0);
  p.sessionsStarted = (p.sessionsStarted||0);
  if (agentId) { p.favAgents[agentId] = (p.favAgents[agentId]||0) + 1; }
  if (topic) { p.favTopics[topic] = (p.favTopics[topic]||0) + 1; }
  var badgeL = state.lang === "zh";
  if (p.totalMsgs >= 100 && p.badges.indexOf("veteran") === -1) p.badges.push("veteran");
  if (p.totalMsgs >= 10 && p.badges.indexOf("beginner") === -1) p.badges.push("beginner");
  var codeCount = state.codeFiles.length;
  var totalSnippets = 0; state.codeFiles.forEach(function(f){ totalSnippets += f.snippets; });
  if (totalSnippets >= 20 && p.badges.indexOf("coder") === -1) p.badges.push("coder");
  if (p.totalMsgs >= 50 && p.badges.indexOf("scholar") === -1) p.badges.push("scholar");
  saveProfile();
}

  try {
    var saved = localStorage.getItem("hopeagent_state_v3");

      var s = JSON.parse(saved);
      if (s.apiKey) state.apiKey = s.apiKey;
      if (s.apiBase) state.apiBase = s.apiBase;
      if (s.model) state.model = s.model;
      if (s.deepModel) state.deepModel = s.deepModel;
      if (s.tokenLimit) state.tokenLimit = s.tokenLimit;
      if (s.messages) state.messages = s.messages;
      if (s.tokenUsed !== undefined) state.tokenUsed = s.tokenUsed;
      if (s.mode) state.mode = s.mode;
      if (s.activeAgentId) {
        var a = AGENTS.find(function(x){return x.id === s.activeAgentId;});
        if (a) state.activeAgent = a;
      }
      if (s.conversations) state.conversations = s.conversations;
      if (s.currentConvId != null) state.currentConvId = s.currentConvId;
    }
    var lang = localStorage.getItem("hopeagent_lang");
    if (lang) state.lang = lang;
  } catch(e) {}
  ensureConv();
}

  try {
    var s = {

      deepModel: state.deepModel, tokenLimit: state.tokenLimit,
      messages: state.messages.slice(-100), tokenUsed: state.tokenUsed,
      mode: state.mode, activeAgentId: state.activeAgent.id,

  } catch(e) {}
}

      messages: state.messages,
      activeAgentId: state.activeAgent.id,
      mode: state.mode,

    }));

  saveState();
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function ensureConv() {
  if (state.conversations.length === 0) {
    var id = generateId();
    state.conversations.push({ id: id, title: "New Conversation", agentId: "orchestrator", msgCount: 0, createdAt: Date.now() });
    state.currentConvId = id;
    state.messages = [];
    state.tokenUsed = 0;
  }
  if (!state.currentConvId || !state.conversations.find(function(c){return c.id === state.currentConvId;})) {
    state.currentConvId = state.conversations[0].id;
    state.messages = [];
    state.tokenUsed = 0;
  }
  try {
    var key = "hopeagent_conv_" + state.currentConvId;
    var saved = localStorage.getItem(key);
    if (saved) {
      var d = JSON.parse(saved);
      state.messages = d.messages || [];
      if (d.activeAgentId) {
        var a = AGENTS.find(function(x){return x.id === d.activeAgentId;});
        if (a) state.activeAgent = a;
      }
      if (d.mode) state.mode = d.mode;
      if (d.tokenUsed !== undefined) state.tokenUsed = d.tokenUsed;
      state.codeFiles = d.codeFiles || [];
    }
  } catch(e) {}
}

function newConversation() {
  fullSave();
  var id = generateId();
  state.conversations.unshift({ id: id, title: "New Conversation", agentId: state.activeAgent.id, msgCount: 0, createdAt: Date.now() });
  state.currentConvId = id;
  state.messages = [];
  state.tokenUsed = 0;
  state.codeFiles = [];
  state.messages = [];
  state.tokenUsed = 0;
  state.activeAgent = AGENTS[0];
  updateHeader();
  updateTokenDisplay();
  renderMessages();
  renderConvList();
  renderSidebar();
  saveState();
}

function switchConversation(convId) {
  if (convId === state.currentConvId) return;
  fullSave();
  state.currentConvId = convId;
  var conv = state.conversations.find(function(c){return c.id === convId;});
  if (!conv) return;
  try {
    var key = "hopeagent_conv_" + convId;
    var saved = localStorage.getItem(key);
    if (saved) {
      var d = JSON.parse(saved);
      state.messages = d.messages || [];
      if (d.activeAgentId) {
        var a = AGENTS.find(function(x){return x.id === d.activeAgentId;});
        if (a) state.activeAgent = a;
      }
      if (d.mode) state.mode = d.mode;
      if (d.tokenUsed !== undefined) state.tokenUsed = d.tokenUsed;
      state.codeFiles = d.codeFiles || [];
    } else {
      state.messages = [];
      state.tokenUsed = 0;
      state.codeFiles = [];
    }
  } catch(e) {
    state.messages = [];
    state.tokenUsed = 0;
    state.codeFiles = [];
  }
  updateHeader();
  updateTokenDisplay();
  renderMessages();
  renderConvList();
  renderSidebar();
  saveState();
  document.getElementById("btnDaily").classList.toggle("active", state.mode === "daily");
  document.getElementById("btnDeep").classList.toggle("active", state.mode === "deep");
}

function deleteConversation(convId, e) {
  e.stopPropagation();
  if (state.conversations.length <= 1) {
    showToast("Cannot delete the last conversation", "error");
    return;
  }
  state.conversations = state.conversations.filter(function(c){return c.id !== convId;});
  try { localStorage.removeItem("hopeagent_conv_" + convId); } catch(e) {}
  if (state.currentConvId === convId) {
    state.currentConvId = state.conversations[0].id;
    state.messages = [];
    state.tokenUsed = 0;
    ensureConv();
  }
  updateHeader();
  updateTokenDisplay();
  renderMessages();
  renderConvList();
  saveState();
}

function updateConvTitle() {
  var conv = state.conversations.find(function(c){return c.id === state.currentConvId;});
  if (!conv) return;
  var userMsgs = state.messages.filter(function(m){return m.type === "user";});
  if (userMsgs.length > 0) {
    var t = userMsgs[0].content;
    if (t.length > 30) t = t.slice(0,30) + "...";
    conv.title = t;
  }
  conv.msgCount = state.messages.length;
  conv.agentId = state.activeAgent.id;
}

function renderConvList() {
  var list = document.getElementById("convList");
  list.innerHTML = state.conversations.map(function(c){
    var active = c.id === state.currentConvId ? " active" : "";
    return '<li class="conv-item' + active + '" onclick="switchConversation(\'' + c.id + '\')">' +
      '<span class="conv-title">' + escapeHtml(c.title || "New Conversation") + '</span>' +
      '<span class="conv-delete" onclick="deleteConversation(\'' + c.id + '\',event)">✕</span>' +
    '</li>';
  }).join("");
}

function renderSidebar() {
  var nav = document.getElementById("sidebarNav");
  var search = document.getElementById("agentSearch").value.toLowerCase();
  var filtered = AGENTS.filter(function(a){
    return !search || a.name.toLowerCase().indexOf(search) !== -1 || a.role.toLowerCase().indexOf(search) !== -1 || a.id.toLowerCase().indexOf(search) !== -1;
  });
  var byLayer = {};
  filtered.forEach(function(a){
    if (!byLayer[a.layer]) byLayer[a.layer] = [];
    byLayer[a.layer].push(a);
  });
  var html = "";
  for (var key in L) {
    var info = L[key];
    var agents = byLayer[key];
    if (!agents || agents.length === 0) continue;
    html += '<div class="nav-section">';
    html += '<div class="nav-section-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
      '<span class="dot" style="background:' + info.dot + '"></span>' + info.name + ' (' + agents.length + ')' +
      '<span class="arrow">▼</span></div>';
    html += '<ul class="agent-list">';
    agents.forEach(function(a){
      var active = state.activeAgent.id === a.id ? " active" : "";
      html += '<li class="agent-item' + active + '" onclick="selectAgent(\'' + a.id + '\')">' +
        '<span class="emoji">' + a.emoji + '</span><span class="name">' + a.name + '</span>' +
        (a.layer === "L1" ? '<span class="badge">Core</span>' : "") + '</li>';
    });
    html += '</ul></div>';
  }
  nav.innerHTML = html;
}

  var a = state.activeAgent;

function updateTokenDisplay() {
  document.getElementById("tokenUsed").textContent = formatNumber(state.tokenUsed);
  document.getElementById("tokenLimit").textContent = state.tokenLimit === 0 ? "∞" : formatNumber(state.tokenLimit);
  var ring = document.getElementById("tokenRing");
  var circumference = 75.4;
  if (state.tokenLimit > 0) {
    var ratio = Math.min(state.tokenUsed / state.tokenLimit, 1);
    ring.setAttribute("stroke-dashoffset", circumference * (1 - ratio));
    ring.setAttribute("stroke", ratio > 0.8 ? "var(--red)" : ratio > 0.5 ? "var(--amber)" : "var(--accent2)");
  } else {
    ring.setAttribute("stroke-dashoffset", 0);
    ring.setAttribute("stroke", "var(--accent2)");
  }
}

function formatNumber(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return n.toString();
}

            '<div class="msg-body' + (msg.streaming ? ' streaming-cursor' : '') + '" ' + (msg.id ? 'id="' + msg.id + '"' : '') + '>' +
              formatContent(msg.content) +
            '</div>' +
            (msg.type === "agent" && !msg.streaming && msg.id ? '<div class="msg-rating">' +
              '<button class="btn-good' + (msg.rated === "good" ? " rated" : "") + '" onclick="rateMessage(\'' + msg.id + '\',\'good\')">👍</button>' +
              '<button class="btn-bad' + (msg.rated === "bad" ? " rated" : "") + '" onclick="rateMessage(\'' + msg.id + '\',\'bad\')">👎</button>' +
            '</div>' : '') +
          '</div></div>';
      }
    });
    if (state.thinking) {
      html += '<div class="message agent"><div class="msg-avatar">' + state.activeAgent.emoji + '</div>' +
        '<div class="msg-content"><div class="msg-header">' + state.activeAgent.name + '</div>' +
        '<div class="msg-body"><div class="loading-dots"><span></span><span></span><span></span></div></div></div></div>';
    }
    container.innerHTML = html;
  }
  container.scrollTop = container.scrollHeight;
}

function formatContent(text) {
  text = escapeHtml(text);
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code){
    var escaped = escapeHtml(code.trim());
    var langDisplay = lang || "code";
    return '<div class="code-block"><div class="code-lang">' +
      '<span>' + langDisplay + '</span>' +
      '<div class="code-actions">' +
        '<button class="btn-copy" onclick="copyCode(this,\'' + escaped.replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/`/g,"\\`") + '\')">Copy</button>' +
        '<button class="btn-download" onclick="downloadCode(\'' + langDisplay + '\',\'' + escaped.replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/`/g,"\\`") + '\')">Download</button>' +
      '</div></div><pre><code>' + escaped + '</code></pre></div>';
  });
  text = text.replace(/`([^`]+)`/g, '<code style="background:rgba(124,92,255,.15);color:#c4b5fd;padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:13px">$1</code>');
  text = text.replace(/\n/g, "<br>");
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
  text = text.replace(/^- (.+)$/gm, "<li>$1</li>");
  text = text.replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>");
  return text;
}

function escapeHtml(text) {
  if (!text) return "";
  return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function copyCode(btn, code) {
  var decoded = code.replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/\\'/g,"'").replace(/\\`/g,"`");
  navigator.clipboard.writeText(decoded).then(function(){
    btn.textContent = "Copied"; btn.classList.add("btn-copied");
    setTimeout(function(){ btn.textContent = "Copy"; btn.classList.remove("btn-copied"); }, 2000);
  });
}

function downloadCode(lang, code) {
  var decoded = code.replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/\\'/g,"'").replace(/\\`/g,"`");
  var extMap = { javascript:"js", typescript:"ts", python:"py", html:"html", css:"css", json:"json", bash:"sh", sql:"sql", yaml:"yaml", markdown:"md", rust:"rs", go:"go", java:"java", cpp:"cpp", c:"c" };
  var ext = extMap[lang] || "txt";
  var blob = new Blob([decoded], { type: "text/plain" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "code." + ext; a.click();
  URL.revokeObjectURL(url);
}

async function sendMessage() {
  var input = document.getElementById("userInput");
  var text = input.value.trim();
  if (!text || state.thinking) return;
  input.value = "";
  input.style.height = "44px";

  var matched = autoMatchAgent(text);
  if (matched && matched.id !== state.activeAgent.id) {
    state.activeAgent = matched;
    updateHeader();
    renderSidebar();
  }

  var fileContent = getAttachedContent();
  state.messages.push({ type: "user", content: text + fileContent });
  state.thinking = true;
  document.getElementById("sendBtn").style.display = "none";
  document.getElementById("stopBtn").style.display = "";
  state.attachedFiles = [];
  showAttachedFiles();
  renderMessages();
  fullSave();

  var kbContext = "";
  if (typeof HOPEAI_KB !== "undefined") {
    var kbMatches = HOPEAI_KB.search(text).slice(0, 3);
    if (kbMatches.length > 0) {
      kbContext = "\n\nRelevant knowledge:\n" + kbMatches.map(function(e){return "- " + e.t + ": " + e.c;}).join("\n");
    }
  }

  var model = state.mode === "deep" ? state.deepModel : state.model;
  var timeSeed = Date.now() % 10000;

  // Build memory context from past conversations
  var memContext = "";
  var profile = state.userProfile;
  if (profile.totalMsgs > 0) {
    var topAgents = Object.entries(profile.favAgents||{}).sort(function(a,b){return b[1]-a[1];}).slice(0,2);
    var topTopics = Object.entries(profile.favTopics||{}).sort(function(a,b){return b[1]-a[1];}).slice(0,2);
    memContext = "\nUser profile: Lv." + getUserLevel() + " " + getLevelName(getUserLevel()) + ", " + (profile.totalMsgs||0) + " messages exchanged. ";
    if (topAgents.length) memContext += "Favored agents: " + topAgents.map(function(a){return a[0];}).join(", ") + ". ";
    if (topTopics.length) memContext += "Common topics: " + topTopics.map(function(a){return a[0];}).join(", ") + ".";
  }

  var sysPrompt = "You are \"" + state.activeAgent.name + "\" (" + state.activeAgent.role + ") on HopeAgent Pro. You are a warm, empathetic, and highly skilled AI assistant. Speak naturally, like a knowledgeable colleague — not a robot reciting facts." +
    (state.mode === "deep" ? " Deep thinking mode: explore thoroughly, show your reasoning process, then deliver a well-structured answer." : " Be clear and helpful, matching the user's energy level.") +
    "\nYour tone: Professional yet approachable. Use warmth where appropriate, be concise when needed. Never use rigid templates or repetitive introductions." +
    "\nLayer: " + L[state.activeAgent.layer].name + "\nTools: " + state.activeAgent.tools + memContext +
    "\nWhen asked the same question repeatedly, rephrase your answer differently each time. Avoid saying 'Certainly!' or 'Of course!' as openers." +
    "\nUse ```lang\\ncode\\n``` for code. Reply in the user's language. Seed:" + timeSeed + kbContext;

  try {
    var messages = [
      { role: "system", content: sysPrompt },
      { role: "user", content: text }
    ];

    streamController = new AbortController();
    var resp = await fetch(state.apiBase + "/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + state.apiKey },
      body: JSON.stringify({ model: model, messages: messages, temperature: state.mode === "deep" ? 0.5 : 0.7, max_tokens: state.mode === "deep" ? 4096 : 2048, stream: true }),
      signal: streamController.signal
    });

    if (!resp.ok) {
      var err = await resp.text();
      throw new Error("API Error (" + resp.status + "): " + err);
    }

    var msgId = "msg_" + Date.now();
    state.messages.push({ type: "agent", id: msgId, content: "", streaming: true });
    renderMessages();

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = "";
    var content = "";
    var totalTokens = 0;

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split("\n");
      buffer = lines.pop();
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line || !line.startsWith("data: ")) continue;
        var dataStr = line.slice(6);
        if (dataStr === "[DONE]") continue;
        try {
          var data = JSON.parse(dataStr);
          var delta = data.choices?.[0]?.delta?.content;
          if (delta) {
            content += delta;
            totalTokens++;
            var el = document.getElementById(msgId);
            if (el) {
              el.innerHTML = formatContent(content) + '<span style="opacity:0">|</span>';
              el.classList.add("streaming-cursor");
            }
            document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
          }
        } catch(e) {}
      }
    }

    var msg = state.messages.find(function(m){return m.id === msgId;});
    if (msg) {
      msg.content = content;
      msg.streaming = false;
    }
    if (totalTokens > 0) {
      state.tokenUsed += totalTokens;
      updateTokenDisplay();
    }

    if (typeof SelfLearning !== "undefined") {
      SelfLearning.track(state.activeAgent.id, text, content, true);
      document.getElementById("learnScore").textContent = SelfLearning.getStats().totalInteractions;
    }

    updateProfile(1, totalTokens || 0, state.activeAgent.id, extractTopic(text));
  } catch(e) {
    if (e.name !== "AbortError") {
      var msgId = "msg_" + Date.now();
      state.messages.push({ type: "agent", id: msgId, content: "AI service error: " + e.message + "\n\nCheck API settings.", rated: null });
    } else {
      var existingStream = state.messages.find(function(m){return m.streaming;});
      if (existingStream) { existingStream.streaming = false; if (!existingStream.content) existingStream.content = "(Stopped)"; }
    }
    if (typeof SelfLearning !== "undefined" && e.name !== "AbortError") {
      SelfLearning.track(state.activeAgent.id, text, e.message, false);
    }
  }

  streamController = null;
  state.thinking = false;
  document.getElementById("sendBtn").style.display = "";
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("sendBtn").classList.remove("loading");
  updateConvTitle();
  renderMessages();
  renderConvList();
  fullSave();
}

function extractCodeBlocks() {
  var files = {};
  state.messages.forEach(function(msg) {
    if (msg.type !== "agent") return;
    var content = msg.content || "";
    var regex = /```(\w*)\n([\s\S]*?)```/g;
    var match;
    while ((match = regex.exec(content)) !== null) {
      var lang = (match[1] || "txt").toLowerCase();
      var code = match[2].trim();
      if (!code) continue;
      var extMap = {javascript:"js",typescript:"ts",python:"py",html:"html",css:"css",json:"json",bash:"sh",sql:"sql",yaml:"yml",markdown:"md",rust:"rs",go:"go",java:"java",cpp:"cpp",c:"c",xml:"xml",php:"php",ruby:"rb",swift:"swift",kotlin:"kt",dockerfile:"dockerfile",shell:"sh",jsx:"jsx",tsx:"tsx",vue:"vue",svelte:"svelte"};
      var ext = extMap[lang] || lang;
      var key = lang + ":" + ext;
      if (!files[key]) files[key] = { lang: lang, ext: ext, codes: [], count: 0 };
      files[key].count++;
      files[key].codes.push(code);
    }
  });
  var result = [];
  for (var k in files) {
    var f = files[k];
    var allCode = f.codes.join("\n\n// --- snippet " + (f.count > 1 ? "" : "") + " ---\n\n");
    var filename = "code_" + Date.now().toString(36) + "_" + f.count + "." + f.ext;
    result.push({ name: filename, lang: f.lang, ext: f.ext, content: allCode, snippets: f.count });
  }
  return result;
}

function renderCodeWorkspace() {
  state.codeFiles = extractCodeBlocks();
  var container = document.getElementById("cwContent");
  document.getElementById("codeCount").textContent = state.codeFiles.length;

  if (state.codeFiles.length === 0) {
    container.innerHTML = '<div class="cw-empty"><div class="big-icon">📁</div><p>No code files yet.</p><p style="font-size:12px;color:var(--muted)">Code blocks from agent responses will auto-collect here. Each language gets its own file.</p></div>';
    return;
  }

  container.innerHTML = '<div class="cw-file-list">' + state.codeFiles.map(function(f, i) {
    var firstLines = f.content.split("\n").slice(0, 3).join("\n");
    var escapedPreview = escapeHtml(firstLines);
    return '<div class="cw-file" id="cwFile' + i + '">' +
      '<div class="cw-file-header" onclick="toggleCodeFile(' + i + ')">' +
        '<span class="cw-file-icon">📄</span>' +
        '<span class="cw-file-name">' + escapeHtml(f.name) + '</span>' +
        '<span class="cw-file-meta">' + f.lang + ' • ' + f.snippets + ' snippets • ' + formatNumber(f.content.length) + ' chars</span>' +
        '<div class="cw-file-actions">' +
          '<button class="cw-copy" onclick="event.stopPropagation();copyCodeFile(' + i + ')" title="Copy">📋</button>' +
          '<button class="cw-download" onclick="event.stopPropagation();downloadCodeFile(' + i + ')" title="Download">⬇</button>' +
        '</div>' +
      '</div>' +
      '<div class="cw-file-body"><pre><code>' + escapedPreview + '</code></pre></div>' +
    '</div>';
  }).join("") + '</div>';
  fullSave();
}

function downloadAllCode() {
  var files = extractCodeBlocks();
  if (files.length === 0) { showToast("No code to download", "error"); return; }
  if (files.length === 1) { downloadCodeFile(0); return; }

  var bundle = files.map(function(f) {
    return "=== " + f.name + " (" + f.lang + ") ===\n" + f.content + "\n";
  }).join("\n");
  var blob = new Blob([bundle], { type: "text/plain" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "hopeagent_code_bundle_" + new Date().toISOString().slice(0,10) + ".txt";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Downloaded " + files.length + " files", "success");
}

function clearCodeWorkspace() {
  state.codeFiles = [];
  state.messages = state.messages.filter(function(m){ return m.type !== "agent" || !/```/.test(m.content); });
  document.getElementById("codeCount").textContent = "0";
  document.getElementById("cwContent").innerHTML = '<div class="cw-empty"><div class="big-icon">📁</div><p>Code workspace cleared.</p></div>';
  fullSave();
  showToast("Code workspace cleared", "success");
}

function clearAllData() {
  localStorage.clear();
  state.messages = [];
  state.tokenUsed = 0;
  state.mode = "daily";
  state.activeAgent = AGENTS[0];
  state.conversations = [];
  state.currentConvId = null;
  state.codeFiles = [];
  ensureConv();
  updateHeader();
  updateTokenDisplay();
  renderMessages();
  renderConvList();
  closeModal();
  showToast("All local data cleared", "success");
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").style.display = "none";
}

function showToast(msg, type) {
  var existing = document.querySelector(".toast");
  if (existing) existing.remove();
  var toast = document.createElement("div");
  toast.className = "toast " + (type || "");
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function(){ toast.remove(); }, 2500);
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

var currentTab = "chat";
function switchTab(tab) {
  currentTab = tab;
  var isChatOrEvo = (tab === "chat" || tab === "evo");
  document.getElementById("chat-container").style.display = isChatOrEvo ? "" : "none";
  document.getElementById("kbPanel").classList.toggle("show", tab === "kb");
  document.getElementById("learnPanel").classList.toggle("show", tab === "learn");
  document.getElementById("cwPanel").classList.toggle("show", tab === "code");
  document.getElementById("input-area").style.display = (tab === "chat") ? "" : "none";
  document.querySelectorAll(".main-tabs button").forEach(function(b){ b.classList.toggle("active", b.dataset.tab === tab); });
  document.querySelectorAll("#bottomNav button").forEach(function(b){ b.classList.remove("active"); });
  var mobileBtn = document.querySelector('#bottomNav button[onclick*="' + tab + '"]');
  if (mobileBtn) mobileBtn.classList.add("active");

  if (tab === "kb") renderKnowledgePanel();
  if (tab === "learn") renderLearnPanel();
  if (tab === "evo") renderEvoPanel();
  if (tab === "code") renderCodeWorkspace();
}

function renderKnowledgePanel() {

  for (var k in stats.byLayer) {
    barHtml += '<div class="kb-stat">' + k + ' <span class="num">' + stats.byLayer[k] + '</span></div>';
  }
  barHtml += '<input type="text" oninput="searchKB(this.value)" placeholder="Search..." style="flex:1;min-width:120px;padding:4px 10px;font-size:12px;border-radius:12px;max-width:200px" />';
  document.getElementById("kbStatsBar").innerHTML = barHtml;

}

function searchKB(q) {
  if (!q) { displayKBEntries(HOPEAI_KB.entries.slice(0, 50)); return; }
  displayKBEntries(HOPEAI_KB.search(q));
}

function displayKBEntries(entries) {
  var diffMap = {1:"easy", 2:"med", 3:"hard"};

    return '<div class="kb-entry" onclick="selectAgent(\'' + (e.g[0]||"") + '\')">' +
      '<h4>' + e.t + ' <span class="diff ' + (e.d===1?"easy":e.d===2?"med":"hard") + '">' + (diffMap[e.d]||"") + '</span></h4>' +
      '<div style="font-size:13px;color:var(--text);line-height:1.6">' + e.c + '</div>' +
      '<div class="tags">' + (e.g||[]).map(function(t){return '<span>' + t + '</span>';}).join("") + '<span style="color:var(--muted);margin-left:8px">' + e.l + '/' + e.s + '</span></div></div>';

function autoMatchAgent(query) {
  if (!query) return null;
  var q = query.toLowerCase();
  var bestAgent = null, bestScore = 0;
  AGENTS.forEach(function(a){
    var score = 0;
    var roleWords = (a.role + " " + a.tools + " " + a.name).toLowerCase().split(/[\s,，、]+/);
    var qWords = q.split(/[\s,，、]+/);
    qWords.forEach(function(w){
      if (roleWords.some(function(rw){return rw.indexOf(w) !== -1;})) score += 2;
    });
    if (q.indexOf(a.id) !== -1) score += 5;
    if (q.indexOf(a.name.toLowerCase()) !== -1) score += 3;
    if (score > bestScore) { bestScore = score; bestAgent = a; }
  });
  return (bestAgent && bestScore >= 2 && bestAgent.id !== state.activeAgent.id) ? bestAgent : null;
}

function extractTopic(text) {
  var topics = { code:["code","function","class","api","bug","algorithm"], design:["design","ui","css","layout"], data:["database","sql","analytics","csv","data"], security:["security","vuln","encrypt","auth"], content:["copy","write","blog","article"] };
  text = text.toLowerCase();
  for (var t in topics) { if (topics[t].some(function(w){return text.indexOf(w)!==-1;})) return t; }
  return null;
}

// ── File Upload ──
function setupFileUpload() {
  var ia = document.getElementById("input-area");
  ia.addEventListener("dragover", function(e){ e.preventDefault(); });
  ia.addEventListener("drop", function(e){ e.preventDefault(); handleFiles(e.dataTransfer.files); });
  document.addEventListener("paste", function(e){
    if (document.activeElement !== document.getElementById("userInput")) return;
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) if (items[i].kind === "file") { e.preventDefault(); handleFiles([items[i].getAsFile()]); return; }
  });
}

function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (f.size > 1024*1024) { showToast("File too large: " + f.name, "error"); continue; }
    var reader = new FileReader();
    reader.onload = (function(file){ return function(e){
      state.attachedFiles.push({ name: file.name, content: e.target.result.slice(0,8000), size: file.size });
      showAttachedFiles();
      showToast(t("fileAttached") + ": " + file.name, "success");
    };})(f);
    reader.readAsText(f);
  }
}

function showAttachedFiles() {
  var el = document.getElementById("attachedFiles");
  if (el) el.remove();
  if (state.attachedFiles.length === 0) return;
  var div = document.createElement("div");
  div.id = "attachedFiles";
  div.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;padding:8px 0";
  div.innerHTML = state.attachedFiles.map(function(f,i){
    return '<span style="background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px">📎 ' + escapeHtml(f.name) + ' <button onclick="removeFile(' + i + ')" style="color:var(--red);font-size:14px;padding:0 4px">✕</button></span>';
  }).join("");
  var inputRow = document.querySelector(".input-row");
  if (inputRow) inputRow.parentNode.insertBefore(div, inputRow);
}

function removeFile(i) { state.attachedFiles.splice(i,1); showAttachedFiles(); }

function getAttachedContent() {
  if (state.attachedFiles.length === 0) return "";
  return "\n\nAttached files:\n" + state.attachedFiles.map(function(f){ return "=== " + f.name + " ===\n" + f.content; }).join("\n\n");
}

function init() {
  loadState();
  renderSidebar();
  renderConvList();
  updateHeader();
  updateTokenDisplay();
  renderMessages();
  setupFileUpload();

  document.getElementById("btnMenu").addEventListener("click", toggleSidebar);
  document.getElementById("btnNewChat").addEventListener("click", function(){
    fullSave();
    newConversation();
    renderSidebar();
    showToast("New conversation created", "success");
  });
  document.getElementById("btnDaily").addEventListener("click", function(){ setMode("daily"); });
  document.getElementById("btnDeep").addEventListener("click", function(){ setMode("deep"); });
  document.getElementById("btnTokenConfig").addEventListener("click", openTokenConfig);
  document.getElementById("btnSettings").addEventListener("click", openSettings);
  document.getElementById("agentSearch").addEventListener("input", renderSidebar);

  var textarea = document.getElementById("userInput");
  textarea.addEventListener("input", function(){
    textarea.style.height = "44px";
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + "px";
  });

  document.addEventListener("keydown", function(e){
    if (e.key === "Escape") {
      if (state.thinking) stopStreaming();
      else closeModal();
    }
  });

  if (window.innerWidth >= 769) {
    document.getElementById("sidebar").classList.remove("open");
  } else {
    document.getElementById("bottomNav").style.display = "block";
  }

  document.getElementById("btnDaily").classList.toggle("active", state.mode === "daily");
  document.getElementById("btnDeep").classList.toggle("active", state.mode === "deep");

  if (typeof HOPEAI_KB !== "undefined") {
    document.getElementById("kbCount").textContent = HOPEAI_KB.total;
  }

  loadProfile();
  if (state.lang) updateAllUI();
}

init();
